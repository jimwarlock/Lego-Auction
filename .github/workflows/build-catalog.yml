name: Build & Deploy LEGO Catalog

on:
  workflow_dispatch:  # Manual trigger - click a button to run
  schedule:
    - cron: '0 9 * * 0'  # Optional: weekly on Sundays at 9 AM

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run scraper
        run: python scraper.py

      - name: Copy data to docs folder
        run: cp data.json docs/data.json

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/data.json data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto: Update LEGO catalog data" && git push)

      - name: Enable GitHub Pages
        uses: actions/github-script@v6
        with:
          script: |
            console.log("GitHub Pages will be available at: https://jimwarlock.github.io/Lego-Auction/");